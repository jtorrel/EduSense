name: Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: auth-service/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/edusense-auth:latest

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            docker pull ghcr.io/${{ github.repository_owner }}/edusense-auth:latest
            docker stop edusense-auth || true
            docker rm edusense-auth || true
            docker run -d \
              --name edusense-auth \
              --restart unless-stopped \
              -p 3000:3000 \
              ghcr.io/${{ github.repository_owner }}/edusense-auth:latest